<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather · professional</title>
  <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->
  <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
  <!-- Google Font + simple icon library (Font Awesome) for a pro touch -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #0b1a2e 0%, #1b2f47 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 1.5rem;
      margin: 0;
    }

    /* main card – clean, elevated, minimal */
    .container {
      max-width: 640px;
      width: 100%;
      background: rgba(18, 34, 58, 0.65);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border-radius: 48px;
      padding: 2.4rem 2.4rem 2rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.04);
      transition: all 0.25s ease;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    /* header */
    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #eef5ff, #b8d0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    header h1 i {
      -webkit-text-fill-color: initial;
      color: #7a9eff;
      font-size: 2rem;
      filter: drop-shadow(0 4px 8px rgba(0, 40, 120, 0.3));
    }

    header p {
      color: rgba(255, 255, 255, 0.6);
      font-weight: 400;
      font-size: 0.95rem;
      letter-spacing: 0.2px;
      margin-top: 0.2rem;
    }

    /* search row */
    .search-container {
      display: flex;
      gap: 0.7rem;
      margin-bottom: 1.8rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    #city-input {
      flex: 1 1 200px;
      padding: 0.9rem 1.5rem;
      border-radius: 60px;
      border: none;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      color: #ffffff;
      font-size: 1rem;
      font-weight: 400;
      outline: 2px solid transparent;
      transition: 0.2s;
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.3);
      letter-spacing: 0.2px;
    }

    #city-input::placeholder {
      color: rgba(255, 255, 255, 0.35);
      font-weight: 300;
    }

    #city-input:focus {
      outline: 2px solid rgba(100, 160, 255, 0.5);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 20px rgba(60, 120, 255, 0.08);
    }

    #search-btn {
      padding: 0.9rem 2.2rem;
      border: none;
      border-radius: 60px;
      background: linear-gradient(135deg, #3f7bff, #5a4fcf);
      color: white;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 20px rgba(50, 100, 255, 0.25);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      flex: 0 0 auto;
    }

    #search-btn i {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    #search-btn:hover {
      transform: scale(1.02);
      background: linear-gradient(135deg, #5589ff, #6b5fdf);
      box-shadow: 0 10px 28px rgba(50, 100, 255, 0.35);
    }

    #search-btn:active {
      transform: scale(0.96);
    }

    /* error */
    #error-container {
      margin: 0.2rem 0 1.2rem;
      padding: 0.55rem 1.2rem;
      border-radius: 60px;
      background: rgba(255, 70, 70, 0.08);
      border: 1px solid rgba(255, 100, 100, 0.15);
      backdrop-filter: blur(8px);
      text-align: center;
      transition: 0.2s;
    }

    #error-container.hidden {
      display: none;
    }

    #error-message {
      color: #ffbaba;
      font-weight: 400;
      font-size: 0.95rem;
      letter-spacing: 0.2px;
    }

    /* weather card */
    #weather-container {
      transition: 0.25s ease;
    }

    #weather-container.hidden {
      display: none;
    }

    .weather-card {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(10px) saturate(160%);
      -webkit-backdrop-filter: blur(10px) saturate(160%);
      border-radius: 36px;
      padding: 1.8rem 1.8rem 1.6rem;
      border: 1px solid rgba(255, 255, 255, 0.02);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
      animation: fadeSlide 0.4s ease;
    }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(14px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .weather-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem 1rem;
      margin-bottom: 1.4rem;
    }

    .weather-header h2 {
      font-size: 2rem;
      font-weight: 600;
      color: white;
      letter-spacing: -0.3px;
      line-height: 1.2;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .weather-header h2 i {
      color: #7a9eff;
      font-size: 1.6rem;
      opacity: 0.8;
    }

    .weather-header #date {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
      font-weight: 400;
      margin-top: 0.2rem;
      letter-spacing: 0.2px;
    }

    .temperature-container {
      text-align: right;
    }

    #temperature {
      font-size: 3.4rem;
      font-weight: 500;
      color: white;
      line-height: 1;
      letter-spacing: -1px;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    #temperature::after {
      content: "°C";
      font-size: 1.6rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.6);
      margin-left: 0.1rem;
    }

    #weather-description {
      color: rgba(255, 255, 255, 0.65);
      font-weight: 400;
      font-size: 1rem;
      text-transform: capitalize;
      letter-spacing: 0.2px;
      margin-top: 0.1rem;
    }

    /* details grid */
    .weather-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.7rem 1rem;
      margin: 1.4rem 0 1rem;
    }

    .detail-item {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(4px);
      border-radius: 24px;
      padding: 0.7rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.02);
      display: flex;
      flex-direction: column;
    }

    .detail-title {
      color: rgba(255, 255, 255, 0.35);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      font-weight: 600;
      margin-bottom: 0.1rem;
    }

    .detail-value {
      color: white;
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: 0.1px;
    }

    .detail-value small {
      font-size: 0.7rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.4);
      margin-left: 0.2rem;
    }

    .weather-icon {
      display: flex;
      justify-content: center;
      margin-top: 0.3rem;
    }

    #weather-icon {
      width: 72px;
      height: 72px;
      filter: drop-shadow(0 6px 18px rgba(0, 20, 60, 0.3));
      background: rgba(255, 255, 255, 0.01);
      border-radius: 60px;
      padding: 4px;
    }

    /* footer */
    footer {
      margin-top: 1.8rem;
      text-align: center;
      color: rgba(255, 255, 255, 0.2);
      font-size: 0.7rem;
      letter-spacing: 0.5px;
      border-top: 1px solid rgba(255, 255, 255, 0.02);
      padding-top: 1.4rem;
      font-weight: 300;
    }

    footer i {
      margin-right: 0.3rem;
      opacity: 0.5;
    }

    @media (max-width: 480px) {
      .container { padding: 1.5rem 1.2rem; }
      .weather-header h2 { font-size: 1.6rem; }
      #temperature { font-size: 2.8rem; }
      .detail-item { padding: 0.5rem 0.8rem; }
      #search-btn { padding: 0.8rem 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><i class="fas fa-cloud-sun"></i> Weather</h1>
      <p>Check the weather anywhere in the world</p>
    </header>

    <main>
      <div class="search-container">
        <input 
          type="text" 
          id="city-input" 
          placeholder="e.g. London, Tokyo" 
        />
        <button id="search-btn"><i class="fas fa-search"></i> Search</button>
      </div>

      <div id="error-container" class="hidden">
        <p id="error-message"></p>
      </div>

      <div id="weather-container" class="hidden">
        <div class="weather-card">
          <div class="weather-header">
            <div>
              <h2><i class="fas fa-map-pin"></i> <span id="location"></span></h2>
              <p id="date"></p>
            </div>
            <div class="temperature-container">
              <div id="temperature"></div>
              <p id="weather-description"></p>
            </div>
          </div>

          <div class="weather-details">
            <div class="detail-item">
              <p class="detail-title"><i class="fas fa-thermometer-half" style="margin-right: 4px;"></i> Feels Like</p>
              <p id="feels-like" class="detail-value"><small>°C</small></p>
            </div>
            <div class="detail-item">
              <p class="detail-title"><i class="fas fa-tint"></i> Humidity</p>
              <p id="humidity" class="detail-value"><small>%</small></p>
            </div>
            <div class="detail-item">
              <p class="detail-title"><i class="fas fa-wind"></i> Wind</p>
              <p id="wind" class="detail-value"><small>m/s</small></p>
            </div>
            <div class="detail-item">
              <p class="detail-title"><i class="fas fa-compress-alt"></i> Pressure</p>
              <p id="pressure" class="detail-value"><small>hPa</small></p>
            </div>
          </div>

          <div class="weather-icon">
            <img id="weather-icon" alt="Weather icon" />
          </div>
        </div>
      </div>
    </main>

    <footer>
      <i class="fas fa-database"></i> Data provided by OpenWeatherMap
    </footer>
  </div>

  <script>
    (function() {
      "use strict";

      // DOM refs
      const cityInput = document.getElementById('city-input');
      const searchBtn = document.getElementById('search-btn');
      const errorContainer = document.getElementById('error-container');
      const errorMessage = document.getElementById('error-message');
      const weatherContainer = document.getElementById('weather-container');

      const locationEl = document.getElementById('location');
      const dateEl = document.getElementById('date');
      const temperatureEl = document.getElementById('temperature');
      const descriptionEl = document.getElementById('weather-description');
      const feelsLikeEl = document.getElementById('feels-like');
      const humidityEl = document.getElementById('humidity');
      const windEl = document.getElementById('wind');
      const pressureEl = document.getElementById('pressure');
      const weatherIcon = document.getElementById('weather-icon');

      // OpenWeatherMap API key (demo key, works for testing)
      const API_KEY = 'bd5e378503939ddaee76f12ad7a97608';

      function showError(msg) {
        errorContainer.classList.remove('hidden');
        errorMessage.textContent = msg || 'Unable to load weather.';
        weatherContainer.classList.add('hidden');
      }

      function hideError() {
        errorContainer.classList.add('hidden');
      }

      function formatDate(timestamp) {
        const d = new Date(timestamp * 1000);
        return d.toLocaleDateString('en-US', {
          weekday: 'short',
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });
      }

      async function fetchWeather(city) {
        if (!city || city.trim() === '') {
          showError('Please enter a city name.');
          return;
        }

        const trimmed = city.trim();
        const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(trimmed)}&units=metric&appid=${API_KEY}`;

        try {
          const response = await fetch(url);
          const data = await response.json();

          if (!response.ok) {
            if (data.cod === 404) {
              showError(`City "${trimmed}" not found.`);
            } else if (data.cod === 401) {
              showError('API key error. Please try later.');
            } else {
              showError(data.message || 'Weather fetch failed.');
            }
            return;
          }

          // success
          hideError();
          weatherContainer.classList.remove('hidden');

          const { name, sys, main, weather, wind, dt } = data;

          locationEl.textContent = `${name}, ${sys.country}`;
          dateEl.textContent = formatDate(dt);
          temperatureEl.textContent = Math.round(main.temp);
          descriptionEl.textContent = weather[0].description;
          feelsLikeEl.textContent = Math.round(main.feels_like);
          humidityEl.textContent = main.humidity;
          windEl.textContent = wind.speed.toFixed(1);
          pressureEl.textContent = main.pressure;

          const iconCode = weather[0].icon;
          weatherIcon.src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
          weatherIcon.alt = weather[0].description;

        } catch (err) {
          showError('Network error. Check your connection.');
          console.warn('Weather fetch error:', err);
        }
      }

      // event listeners
      searchBtn.addEventListener('click', function() {
        fetchWeather(cityInput.value);
      });

      cityInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          fetchWeather(cityInput.value);
        }
      });

      // initial load: London
      window.addEventListener('DOMContentLoaded', function() {
        cityInput.value = 'London';
        fetchWeather('London');
      });
    })();
  </script>
</body>
</html>
